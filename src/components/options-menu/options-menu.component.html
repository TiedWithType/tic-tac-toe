<dialog id="options_modal" aria-label="Game options">
  <section id="options_menu" class="controls" aria-label="Game options">
    <section class="color-options" aria-label="Marker colors">
      <label aria-label="Circle marker color">
        <span class="marker-icon marker-icon-circle" aria-hidden="true"></span>
        <input id="circle_color" type="color" />
      </label>
      <label aria-label="Cross marker color">
        <span class="marker-icon marker-icon-cross" aria-hidden="true"></span>
        <input id="cross_color" type="color" />
      </label>
    </section>
    <button id="reset">
      <span class="material-symbols-rounded" aria-hidden="true">restart_alt</span>
      <span>new round</span>
    </button>
    <button id="history_toggle">
      <span class="material-symbols-rounded" aria-hidden="true">history</span>
      <span>history</span>
    </button>
    <button id="mute_toggle">
      <span class="material-symbols-rounded" aria-hidden="true">volume_up</span>
      <span>sound</span>
    </button>
    <button id="reset_game">
      <span class="material-symbols-rounded" aria-hidden="true">home</span>
      <span>menu</span>
    </button>
    <p id="options_version">
      <span class="material-symbols-rounded" aria-hidden="true">info</span>
      <span>v.4.1.0 beta "Key Lime Pie" by TiedWithType</span>
    </p>
  </section>
</dialog>
