<dialog id="options_modal" aria-label="Game options">
  <section id="options_menu" class="controls" aria-label="Game options">
    <section class="color-options" aria-label="Marker colors">
      <label aria-label="Circle marker color">
        <span class="marker-icon marker-icon-circle" aria-hidden="true"></span>
        <input id="circle_color" type="color" />
      </label>
      <label aria-label="Cross marker color">
        <span class="marker-icon marker-icon-cross" aria-hidden="true"></span>
        <input id="cross_color" type="color" />
      </label>
    </section>
    <button-ripple id="reset">
      <material-icon>restart_alt</material-icon>
      <span>new round</span>
    </button-ripple>
    <button-ripple id="history_toggle">
      <material-icon>history</material-icon>
      <span>history</span>
    </button-ripple>
    <button-ripple id="mute_toggle">
      <material-icon>volume_up</material-icon>
      <span>sound</span>
    </button-ripple>
    <button-ripple id="reset_game">
      <material-icon>home</material-icon>
      <span>menu</span>
    </button-ripple>
    <p id="options_version">
      <material-icon>info</material-icon>
      <tic-app-footer inline></tic-app-footer>
    </p>
  </section>
</dialog>
