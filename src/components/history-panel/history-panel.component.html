<aside id="history_panel" aria-label="{{ labels.history }}" aria-hidden="true">
  <header>
    <span>{{ labels.session }}</span>
    <button-ripple id="history_close" aria-label="{{ labels.closeHistory }}">{{ labels.close }}</button-ripple>
  </header>
  <section class="stats">
    <span id="stat_rounds">{{ roundsLabel }}</span>
    <span id="stat_draws">{{ drawsLabel }}</span>
    <span id="stat_circle_wins">{{ circleWinsLabel }}</span>
    <span id="stat_cross_wins">{{ crossWinsLabel }}</span>
    <span id="stat_circle_rate">{{ circleRateLabel }}</span>
    <span id="stat_cross_rate">{{ crossRateLabel }}</span>
  </section>
  <ol id="history_list"></ol>
</aside>
