<aside id="history_panel" aria-label="Session history" aria-hidden="true">
  <header>
    <span>session</span>
    <button-ripple id="history_close" aria-label="Close history">close</button-ripple>
  </header>
  <section class="stats">
    <span id="stat_rounds">0 rounds</span>
    <span id="stat_draws">0 draws</span>
    <span id="stat_circle_wins">O 0 wins</span>
    <span id="stat_cross_wins">X 0 wins</span>
    <span id="stat_circle_rate">O 0%</span>
    <span id="stat_cross_rate">X 0%</span>
  </section>
  <ol id="history_list"></ol>
</aside>
