<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play Tic Tac Toe with local players, AI modes, custom marker colors, sounds, session history and mobile-friendly settings."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&icon_names=settings"
      rel="stylesheet"
    />
    <link rel="icon" type="image/webp" href="/icon.webp" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./app.ts"></script>
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <main id="game">
      <p id="round_status" aria-live="polite"></p>
      <p id="round_meta"></p>
      <header>
        <section id="player_1">
          <span class="name">
            <span class="player-name">player 1</span>
            <span class="marker"> (O)</span>
          </span>
          <span class="result">0</span>
        </section>
        <section class="divider">:</section>
        <section id="player_2">
          <span class="name">
            <span class="player-name">player 2</span>
            <span class="marker"> (X)</span>
          </span>
          <span class="result">0</span>
        </section>
      </header>
      <section id="board">
        <figure data-tile="tile_1"></figure>
        <figure data-tile="tile_2"></figure>
        <figure data-tile="tile_3"></figure>
        <figure data-tile="tile_4"></figure>
        <figure data-tile="tile_5"></figure>
        <figure data-tile="tile_6"></figure>
        <figure data-tile="tile_7"></figure>
        <figure data-tile="tile_8"></figure>
        <figure data-tile="tile_9"></figure>
        <span id="win_line" aria-hidden="true"></span>
      </section>
      <div id="desktop_options_mount">
        <section id="options_menu" class="controls" aria-label="Game options">
          <button id="options_close" type="button">close</button>
          <section class="color-options" aria-label="Marker colors">
            <label>
              <span>O</span>
              <input id="circle_color" type="color" />
            </label>
            <label>
              <span>X</span>
              <input id="cross_color" type="color" />
            </label>
          </section>
          <button id="reset">new round</button>
          <button id="change_mode">change mode</button>
          <button id="history_toggle">history</button>
          <button id="mute_toggle">sound on</button>
          <button id="reset_game">main menu</button>
          <p id="options_version">v.2.3.0 "Gelato" by TiedWithType</p>
        </section>
      </div>
    </main>
    <button id="mobile_reset" type="button">new round</button>
    <button id="settings_toggle" type="button" aria-label="Open game settings" hidden>
      <span class="material-symbols-rounded" aria-hidden="true">settings</span>
    </button>
    <dialog id="options_modal" aria-label="Game options"></dialog>
    <section id="start_overlay" aria-label="Start game">
      <h1 id="app_title">Tic Tac Toe</h1>
      <section class="difficulty-panel" aria-label="AI difficulty">
        <span>AI difficulty</span>
        <div class="difficulty-options">
          <button data-difficulty="easy" type="button" title="Easy: mostly random moves with a small tactical chance.">easy</button>
          <button data-difficulty="normal" type="button" title="Normal: blocks, wins and sometimes searches for the best move.">normal</button>
          <button data-difficulty="hard" type="button" title="Hard: uses the best available move.">hard</button>
        </div>
      </section>
      <section class="starter-panel" aria-label="Starting player">
        <span>starts</span>
        <div class="starter-options">
          <button data-starter="circle" type="button">O</button>
          <button data-starter="cross" type="button">X</button>
          <button data-starter="random" type="button">random</button>
        </div>
      </section>
      <div class="start-actions">
        <button id="start_game" data-mode="user-user">Start game</button>
        <button data-mode="user-ai">Start game (user vs ai)</button>
        <button data-mode="ai-ai">Start game (ai vs ai)</button>
      </div>
    </section>
    <aside id="history_panel" aria-label="Session history" aria-hidden="true">
      <header>
        <span>session</span>
        <button id="history_close" type="button" aria-label="Close history">close</button>
      </header>
      <section class="stats">
        <span id="stat_rounds">0 rounds</span>
        <span id="stat_draws">0 draws</span>
        <span id="stat_circle_wins">O 0 wins</span>
        <span id="stat_cross_wins">X 0 wins</span>
        <span id="stat_circle_rate">O 0%</span>
        <span id="stat_cross_rate">X 0%</span>
      </section>
      <ol id="history_list"></ol>
    </aside>
    <footer id="app_footer">v.2.3.0 "Gelato" by TiedWithType</footer>
  </body>
</html>
